<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <style>
   
  </style>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

     <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">


      function ChatInput({chatMessages, setChatMessages}){
          const [inputText, setInputText] = React.useState('');

              function SaveInputText(event){
                setInputText(event.target.value);
                }

                async function sendMessage(){
                    const newChatMessages =  [
                                        ...chatMessages,
                                        {
                                          message: inputText,
                                          sender:'mohan raj photo',
                                          id: crypto.randomUUID()
                                        },
                                        {
                                            message: 'Loading...',
                                            sender: 'robot',
                                            id: crypto.randomUUID()
                                          }
                                        ];

                    setChatMessages(newChatMessages);

                     setInputText('');    

                      const response = await Chatbot.getResponseAsync(inputText);
                       setChatMessages([
                                        ...newChatMessages.slice(0, newChatMessages.length - 1), 
                                        {
                                          message: response,
                                          sender:'chatbot logo',
                                          id: crypto.randomUUID()
                                        }
                                        ]);
                       
                }

                function handleKeyDown(event){
                  if(event.key === 'Enter'){
                    sendMessage();
                  }
                  else if(event.key === 'Escape'){
                     setInputText('');
                  }
                }
        return (
          <div className="chat-input-container">
           <input 
             placeholder="Send a message to Chatbot" 
             size="30" 
             onChange = {SaveInputText}
             value={inputText}
             onKeyDown ={handleKeyDown}
             className = "chat-input"
             />
           <button className="send-button" onClick={sendMessage}>Send</button>
          </div>
        );
      }

      function ChatMessage({message, sender}){
       //const message = props.message;
       //const sender = props.sender;

       //const {message, sender} = props;

       /*if(sender === 'chatbot logo'){
           return(
           <div>
              <img src="chatbot logo.png" width="40"/>
              {message}
           </div>
        );
       }*/

        return(
           <div className = {sender === 'mohan raj photo' ? 'chat-message-user' : 'chat-message-robot'}>
            {sender === 'chatbot logo' && (
              <img src="chatbot logo.png" className="chat-profile-image"/>
              )}
              <div className="chat-message-text">
               {message}
              </div>
            {sender === 'mohan raj photo' && (
              <img src="Mohan Raj Photo.jpg" className="chat-profile-image"/>
              )}
           </div>
        );
      }

      function ChatMessages({chatMessages}){
        const chatMessageRef = React.useRef(null);

         React.useEffect(()=>{
             const containerElem = chatMessageRef.current;
             if(containerElem){
               containerElem.scrollTop = containerElem.scrollHeight;
             }
         }, [chatMessages]);
    
      // const [chatMessages, setChatMessages] = array;

        //const chatMessages = array[0];
       // const setChatMessages = array[1];

                                   /*   function sendMessage(){
                                        setChatMessages([
                                        ...chatMessages,
                                        {
                                          message:'testing',
                                          sender:'mohan raj photo',
                                          id: crypto.randomUUID()
                                        }
                                        ]);
                                      }*/

                return(
                  <div className="chat-message-container" ref={chatMessageRef}>
                   {chatMessages.map((chatMessage) => {
                                                                                  return(
                                                                                    <ChatMessage message={chatMessage.message}
                                                                                                sender={chatMessage.sender} 
                                                                                                key={chatMessage.id}/>
                                                                                  );
                                                                                })}
                                                                              </div>
                );

      }

      function App(){

           const [chatMessages, setChatMessages] = React.useState(
                                     [{message: 'hello chatbot', sender: 'mohan raj photo', id:'id1'},
                                      {message: 'Hello! How can I help you?', sender: 'chatbot logo', id:'id2'},
                                      {message: 'Can you get me todays date?', sender: 'mohan raj photo', id:'id3'},
                                      {message: 'Today is may 19', sender: 'chatbot logo', id:'id4'}
                                      ]
        );
               

        return(
                  <div className="app-container">
                   
                    <ChatMessages 
                       chatMessages = {chatMessages}

                    />

                     <ChatInput 
                       chatMessages = {chatMessages}
                       setChatMessages = {setChatMessages}
                    />
                  </div>
        );
      }


      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
