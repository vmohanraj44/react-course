<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput(){
        return (
          <>
           <input 
             placeholder="Send a message to Chatbot" 
             size="30" 
             />
           <button>Send</button>
           </>
        );
      }

      function ChatMessage({message, sender}){

        return(
           <div>
            {sender === 'chatbot logo' && (
              <img src="chatbot logo.png" width="40"/>
              )}
              {message}
            {sender === 'mohan raj photo' && (
              <img src="Mohan Raj Photo.jpg" width="40"/>
              )}
           </div>
        );
      }

      function ProductDetails({productName, productPrice, discountPrice, imageSrc}){
        return(
                   <div>
                   <img src={imageSrc} width="150" />
                    <p> {productName} </p>
                   {discountPrice === "" ? (<p> Price: $ {productPrice}</p>) : (<del><p> Price: $ {productPrice}</p></del>)}

                    {discountPrice != "" && (<p>Discount Price: $ {discountPrice}</p>)}
                    <button>Add to Cart</button>
                   </div>
        );
      }

      function App(){

        return(
                <>
                <ProductDetails productName = "Cotton Socks" productPrice="10.90" discountPrice="5.45" imageSrc = "cotton-socks.png" />
                <ProductDetails productName = "Tennis Balls" productPrice="6.00" discountPrice = "" imageSrc = "tennis-balls.png" />
                <ProductDetails productName = "Plain T-Shirt" productPrice="7.99" discountPrice = "" imageSrc = "plain-t-shirt.png" />
                </>
        );
      }


      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
